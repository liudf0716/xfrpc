# frps configuration for QUIC test environment
bindAddr = "127.0.0.1"
bindPort = 7000

# QUIC transport port
quicBindPort = 7002

# Authentication
auth.method = "token"
auth.token = "test-quic-token-2026"

# Transport settings
transport.maxPoolCount = 5
transport.heartbeatTimeout = 90

# QUIC transport tuning — must exceed xfrpc heartbeat interval (30s)
transport.quic.maxIdleTimeout = 120
transport.quic.keepalivePeriod = 10
transport.quic.maxIncomingStreams = 100000

# Disable TLS for testing (frps uses its own QUIC TLS)
transport.tls.force = false

# Logging
log.to = "console"
log.level = "debug"
log.disablePrintColor = false

# Disable dashboard for testing
# webServer.port = 0

# Allow detailed errors
detailedErrorsToClient = true
